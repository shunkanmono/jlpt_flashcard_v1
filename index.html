<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="일본어 단어장">
<meta name="theme-color" content="#1A1A2E">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>일본어 단어장</title>
<style>
:root{--bg:#1A1A2E;--card1:#16213E;--card2:rgba(15,52,96,0.8);--border:rgba(255,255,255,0.08);--txt:#fff;--dim:rgba(255,255,255,0.45);--dim2:rgba(255,255,255,0.25);--blue:#4A90D9;--green:#27AE60;--green2:#2ECC71;--red:#E74C3C;--orange:#E67E22;--yellow:#F39C12;--n1:#E74C3C;--n2:#E67E22;--n3:#F39C12;--n4:#27AE60;--n5:#2980B9}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:-apple-system,'Noto Sans KR','Hiragino Sans',sans-serif;overflow:hidden;user-select:none}
#app{display:flex;flex-direction:column;height:100dvh;max-width:420px;margin:0 auto;background:var(--bg);border-left:1px solid var(--border);border-right:1px solid var(--border)}

/* TITLEBAR — flashcard_screen.dart _buildTitleBar */
#titlebar{display:flex;align-items:center;height:36px;padding:0 12px;background:rgba(255,255,255,0.04);border-bottom:1px solid var(--border);flex-shrink:0}
#titlebar .dots{display:flex;gap:3px;margin-right:8px}
#titlebar .dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.25)}
#titlebar .title{font-size:12px;font-weight:600;color:rgba(255,255,255,0.7);letter-spacing:.5px;flex:1}
.tbtn{display:flex;align-items:center;gap:4px;padding:2px 6px;border-radius:4px;border:1px solid rgba(74,144,217,0.4);background:rgba(74,144,217,0.2);font-size:10px;font-weight:700;color:var(--blue);cursor:pointer}
.tbtn.muted{background:rgba(255,255,255,0.06);border-color:rgba(255,255,255,0.1);color:rgba(255,255,255,0.38)}
.tbtn svg{width:12px;height:12px}

/* LEVEL/BATCH BAR — flashcard_screen.dart _buildLevelBatchBar */
#levelbar{padding:6px 10px;flex-shrink:0}
.level-row{display:flex;align-items:center;gap:4px;margin-bottom:6px}
.lvl-btn{padding:4px 8px;border-radius:6px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);font-size:11px;color:rgba(255,255,255,0.38);cursor:pointer;transition:all .2s}
.lvl-btn.active{color:#fff;font-weight:700}
.lvl-btn[data-l="5"].active{background:var(--n5);border-color:var(--n5)}
.lvl-btn[data-l="4"].active{background:var(--n4);border-color:var(--n4)}
.lvl-btn[data-l="3"].active{background:var(--n3);border-color:var(--n3)}
.lvl-btn[data-l="2"].active{background:var(--n2);border-color:var(--n2)}
.lvl-btn[data-l="1"].active{background:var(--n1);border-color:var(--n1)}
.bm-btn{margin-left:auto;display:flex;align-items:center;gap:3px;padding:4px 8px;border-radius:6px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);font-size:11px;font-weight:700;color:rgba(255,255,255,0.38);cursor:pointer;transition:all .2s}
.bm-btn.active{background:rgba(231,76,60,0.3);border-color:rgba(231,76,60,0.6);color:var(--red)}
.bm-btn svg{width:10px;height:10px}
.stage-scroll{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;height:26px}
.stage-scroll::-webkit-scrollbar{display:none}
.stage-btn{flex-shrink:0;padding:4px 10px;border-radius:6px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);font-size:10px;color:rgba(255,255,255,0.38);cursor:pointer;white-space:nowrap;transition:all .2s}
.stage-btn.active{background:rgba(255,255,255,0.15);border-color:rgba(255,255,255,0.4);color:#fff;font-weight:700}

/* PROGRESS BAR — progress_bar_widget.dart */
#progressbar{padding:4px 10px 6px;flex-shrink:0}
.pbar-track{height:4px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;margin-bottom:5px}
.pbar-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--green2));border-radius:2px;transition:width .4s;box-shadow:0 0 6px rgba(39,174,96,0.4)}
.pbar-stats{display:flex;align-items:center;gap:6px;font-size:10px}
.stat-chip{display:flex;align-items:center;gap:3px;font-weight:600}
.stat-chip svg{width:10px;height:10px}
.stat-chip.mem{color:var(--green)}
.stat-chip.flag{color:var(--red)}
.batch-nav{margin-left:auto;display:flex;align-items:center;gap:4px}
.bnav-btn{width:20px;height:20px;border-radius:4px;background:rgba(255,255,255,0.08);border:none;color:rgba(255,255,255,0.5);cursor:pointer;display:flex;align-items:center;justify-content:center}
.bnav-btn:disabled{opacity:.3;cursor:default}
.bnav-btn svg{width:14px;height:14px}
.batch-num{font-size:10px;color:var(--dim)}

/* MAIN AREA */
#main{flex:1;overflow:hidden;position:relative}

/* FLASHCARD — flashcard_widget.dart */
#fc-area{display:flex;flex-direction:column;padding:8px 12px 4px;height:100%;overflow:hidden}
.fc-counter{display:flex;align-items:center;font-size:11px;color:var(--dim2);margin-bottom:8px}
.mode-badge{margin-left:6px;padding:1px 6px;border-radius:4px;background:rgba(243,156,18,0.2);font-size:10px;color:var(--yellow)}
.fc-bm-count{margin-left:auto;display:flex;align-items:center;gap:3px;font-size:11px;color:rgba(243,156,18,0.7)}
.fc-bm-count svg{width:10px;height:10px}

.card{flex:1;border-radius:12px;background:linear-gradient(135deg,var(--card1),var(--card2));border:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 16px;cursor:pointer;position:relative;overflow:hidden;touch-action:pan-y}
.card:active{transform:scale(0.99)}

.lv-badge{padding:3px 8px;border-radius:6px;font-size:10px;font-weight:700;margin-bottom:16px}
.kanji-txt{font-weight:300;letter-spacing:2px;text-align:center;margin-bottom:16px}
.divider-sm{width:60px;height:1px;background:rgba(255,255,255,0.15);margin-bottom:12px}
.hira-row{display:flex;align-items:center;gap:6px;min-height:1.4em}
.hira-txt{letter-spacing:1.5px;color:var(--blue);transition:opacity .3s}
.hira-txt.hidden{opacity:0}
.vol-btn{background:none;border:none;cursor:pointer;color:rgba(74,144,217,0.6);padding:2px;display:flex;align-items:center}
.vol-btn svg{width:14px;height:14px}
.ko-txt{color:rgba(255,255,255,0.85);font-weight:500;text-align:center;padding:0 16px;margin-top:8px;transition:opacity .3s}
.ko-txt.hidden{opacity:0}

.ex-area{margin-top:12px;padding-top:10px;border-top:1px solid rgba(255,255,255,0.1);width:100%;text-align:center;cursor:pointer}
.ruby-wrap{display:flex;flex-wrap:wrap;justify-content:center;align-items:flex-end}
.ruby-unit{display:inline-flex;flex-direction:column;align-items:center}
.ruby-unit .rt{color:rgba(74,144,217,0.6);line-height:1.2;min-height:1em}
.ruby-unit .rb{line-height:1.4}
.ex-ko{color:rgba(255,255,255,0.4);margin-top:4px;line-height:1.5}
.ex-hint{display:flex;align-items:center;justify-content:center;gap:3px;margin-top:4px;color:rgba(255,255,255,0.2);font-size:9px}
.ex-hint svg{width:10px;height:10px}

.tap-hint{margin-top:16px;font-size:11px;color:var(--dim2);transition:opacity .3s}
.tap-hint.hidden{opacity:0}

.bm-overlay{position:absolute;top:8px;right:8px;width:28px;height:28px;border-radius:6px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s}
.bm-overlay.flagged{background:rgba(243,156,18,0.2);border-color:rgba(243,156,18,0.5)}
.bm-overlay svg{width:14px;height:14px;color:rgba(255,255,255,0.3)}
.bm-overlay.flagged svg{color:var(--yellow)}

.swipe-hint{position:absolute;bottom:8px;left:0;right:0;display:flex;justify-content:center;gap:20px;font-size:9px;color:rgba(255,255,255,0.15);pointer-events:none}

/* EMPTY STATE */
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:20px}
.empty-state svg{width:40px;height:40px;color:rgba(255,255,255,0.2)}
.empty-state p{font-size:13px;color:var(--dim);text-align:center}
.switch-btn{padding:6px 14px;border-radius:6px;background:rgba(74,144,217,0.2);border:1px solid rgba(74,144,217,0.4);color:var(--blue);font-size:12px;cursor:pointer}

/* ACTION BUTTONS — flashcard_widget.dart _buildActionButtons */
#actions{padding:0 12px 4px;display:flex;gap:6px;flex-shrink:0}
.act-btn{flex:1;height:40px;border-radius:8px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;font-size:12px;font-weight:600;transition:opacity .15s}
.act-btn:active{opacity:.75}
.act-btn.bad{background:rgba(231,76,60,0.15);border:1px solid rgba(231,76,60,0.4);color:var(--red)}
.act-btn.bad.bm-mode{background:rgba(243,156,18,0.15);border-color:rgba(243,156,18,0.4);color:var(--yellow)}
.act-btn.skip{flex:none;width:40px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.4)}
.act-btn.good{background:rgba(39,174,96,0.15);border:1px solid rgba(39,174,96,0.4);color:var(--green)}
.act-btn svg{width:14px;height:14px}

/* CONTROL BAR — control_bar_widget.dart */
#controlbar{height:40px;padding:0 10px;display:flex;align-items:center;gap:2px;background:rgba(255,255,255,0.03);border-top:1px solid rgba(255,255,255,0.06);border-radius:0 0 12px 12px;flex-shrink:0}
.cb{width:28px;height:28px;border-radius:6px;background:rgba(255,255,255,0.04);border:none;color:rgba(255,255,255,0.38);cursor:pointer;display:flex;align-items:center;justify-content:center}
.cb:active{background:rgba(255,255,255,0.1)}
.cb svg{width:14px;height:14px}
.cb-spacer{flex:1}
.cb-txt{display:flex;align-items:center;gap:3px;padding:4px 7px;border-radius:6px;background:rgba(255,255,255,0.04);border:none;color:rgba(255,255,255,0.4);font-size:10px;cursor:pointer}
.cb-txt svg{width:12px;height:12px}
.cb-txt+.cb-txt{margin-left:4px}

/* SIDE PANELS — settings_panel.dart, stats_panel.dart */
.side-panel{position:absolute;inset:0;background:var(--bg);overflow-y:auto;padding:14px;z-index:10}
.panel-hdr{display:flex;align-items:center;margin-bottom:16px}
.panel-hdr h2{font-size:14px;font-weight:600;flex:1}
.panel-close{background:none;border:none;color:rgba(255,255,255,0.38);cursor:pointer}
.panel-close svg{width:16px;height:16px}
.sec-label{font-size:11px;color:var(--dim);letter-spacing:.5px;margin-bottom:8px}
.divider-line{height:1px;background:rgba(255,255,255,0.07);margin:14px 0}

/* Settings */
.setting-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.range-input{flex:1;-webkit-appearance:none;height:3px;background:rgba(255,255,255,0.12);border-radius:2px;outline:none}
.range-input::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#fff;cursor:pointer}
.chip-group{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.chip{padding:5px 12px;border-radius:6px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);font-size:12px;color:rgba(255,255,255,0.38);cursor:pointer;transition:all .15s}
.chip.active{background:rgba(74,144,217,0.25);border-color:rgba(74,144,217,0.6);color:var(--blue);font-weight:700}
.toggle-wrap{display:flex;align-items:center;gap:10px}
.toggle{width:44px;height:24px;border-radius:12px;background:rgba(255,255,255,0.1);border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.toggle.on{background:rgba(74,144,217,0.8)}
.toggle-knob{position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:left .2s}
.toggle.on .toggle-knob{left:22px}
.toggle-label{font-size:12px;color:rgba(255,255,255,0.6)}
.preview-card{background:var(--card1);border-radius:8px;border:1px solid var(--border);padding:12px 8px;text-align:center;margin-bottom:14px}
.tip-box{background:rgba(74,144,217,0.08);border:1px solid rgba(74,144,217,0.2);border-radius:8px;padding:10px;font-size:10px;color:rgba(255,255,255,0.5);line-height:1.7}
.tip-box .tip-title{display:flex;align-items:center;gap:4px;color:var(--blue);font-size:11px;font-weight:600;margin-bottom:6px}
.tip-box .tip-title svg{width:12px;height:12px}

/* Stats */
.stats-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:8px;padding:10px;margin-bottom:12px}
.mini-stats{display:flex}
.mini-stat{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.mini-stat svg{width:16px;height:16px}
.mini-stat .val{font-size:16px;font-weight:700}
.mini-stat .lbl{font-size:9px;color:var(--dim)}
.mini-stat.mem svg,.mini-stat.mem .val{color:var(--green)}
.mini-stat.flag svg,.mini-stat.flag .val{color:var(--red)}
.mini-stat.rem svg,.mini-stat.rem .val{color:rgba(255,255,255,0.38)}
.sp-track{height:6px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden;margin-top:8px}
.sp-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--green2));border-radius:3px}
.sp-pct{font-size:10px;color:var(--dim);text-align:center;margin-top:4px}
.lsr{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;border:1px solid rgba(255,255,255,0.05);background:rgba(255,255,255,0.03);margin-bottom:6px}
.lsr.cur{border-color:rgba(74,144,217,0.3);background:rgba(74,144,217,0.08)}
.lsr-badge{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.lsr-info{flex:1}
.lsr-nums{display:flex;align-items:center;font-size:11px;color:rgba(255,255,255,0.6);margin-bottom:4px}
.lsr-pct{margin-left:auto;font-size:10px;font-weight:600}
.lsr-track{height:3px;background:rgba(255,255,255,0.07);border-radius:2px;overflow:hidden}
.lsr-fill{height:100%;border-radius:2px}

/* DIALOG — flashcard_screen.dart dialogs */
.dlg-bg{position:fixed;inset:0;background:rgba(0,0,0,0.55);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.dlg{background:var(--bg);border-radius:16px;padding:20px;max-width:320px;width:100%;border:1px solid var(--border)}
.dlg-emoji{font-size:40px;text-align:center;margin-bottom:12px}
.dlg h3{font-size:20px;font-weight:700;text-align:center;margin-bottom:6px}
.dlg p{font-size:12px;color:var(--dim);text-align:center;line-height:1.6;margin-bottom:20px;white-space:pre-line}
.dlg-btn{width:100%;padding:10px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;margin-bottom:8px;text-align:center}
.dlg-btn:active{opacity:.8}
.dlg-btn.green{background:rgba(39,174,96,0.2);border:1px solid rgba(39,174,96,0.5);color:var(--green)}
.dlg-btn.blue{background:rgba(74,144,217,0.2);border:1px solid rgba(74,144,217,0.5);color:var(--blue)}
.dlg-btn.red{background:rgba(231,76,60,0.2);border:1px solid rgba(231,76,60,0.5);color:var(--red)}
.dlg-confirm{display:flex;gap:8px}
.dlg-confirm .dlg-btn{flex:1}
</style>
</head>
<body>
<div id="app">

<!-- TITLEBAR -->
<div id="titlebar">
  <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
  <span class="title" id="app-title">일본어 단어장</span>
  <button class="tbtn" id="sound-btn" onclick="toggleSound()">
    <svg id="sound-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
  </button>
  <button class="tbtn" id="lang-btn" onclick="toggleLang()" style="margin-left:6px">KO</button>
</div>

<!-- LEVEL BAR -->
<div id="levelbar">
  <div class="level-row">
    <button class="lvl-btn" data-l="5" onclick="setLevel(5)">N5</button>
    <button class="lvl-btn" data-l="4" onclick="setLevel(4)">N4</button>
    <button class="lvl-btn" data-l="3" onclick="setLevel(3)">N3</button>
    <button class="lvl-btn" data-l="2" onclick="setLevel(2)">N2</button>
    <button class="lvl-btn" data-l="1" onclick="setLevel(1)">N1</button>
    <button class="bm-btn" id="bm-mode-btn" onclick="toggleStudyMode()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
      <span id="total-flag-count">0</span>
    </button>
  </div>
  <div class="stage-scroll" id="stage-scroll"></div>
</div>

<!-- PROGRESS BAR -->
<div id="progressbar">
  <div class="pbar-track"><div class="pbar-fill" id="pbar-fill" style="width:0%"></div></div>
  <div class="pbar-stats">
    <div class="stat-chip mem">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 12l2 2 4-4M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      <span id="p-mem">0</span>/<span id="p-tot">0</span>
    </div>
    <div class="stat-chip flag" id="p-flag-wrap" style="display:none">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
      <span id="p-flag">0</span>
    </div>
    <div class="batch-nav">
      <button class="bnav-btn" id="prev-batch" onclick="goToPrevBatch()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg></button>
      <span class="batch-num" id="batch-num">1/1</span>
      <button class="bnav-btn" id="next-batch" onclick="goToNextBatch()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg></button>
    </div>
  </div>
</div>

<!-- MAIN -->
<div id="main">
  <!-- FLASHCARD AREA -->
  <div id="fc-area">
    <div class="fc-counter">
      <span id="fc-counter-txt">0 / 0</span>
      <span class="mode-badge" id="fc-mode-badge" style="display:none">북마크</span>
      <div class="fc-bm-count" id="fc-bm-chip">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
        <span id="fc-bm-num">0</span>
      </div>
    </div>
    <div class="card" id="flashcard" onclick="onCardTap(event)" ontouchstart="tsStart(event)" ontouchend="tsEnd(event)">
      <div class="lv-badge" id="c-lv-badge">N5</div>
      <div class="kanji-txt" id="c-kanji" style="font-size:30px">—</div>
      <div class="divider-sm"></div>
      <div class="hira-row">
        <span class="hira-txt hidden" id="c-hira">—</span>
        <button class="vol-btn" id="c-vol" onclick="speakHira(event)" style="display:none"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg></button>
      </div>
      <div class="ko-txt hidden" id="c-ko">—</div>
      <div class="ex-area" id="c-ex-area" style="display:none" onclick="speakEx(event)">
        <div class="ruby-wrap" id="c-ex-ruby"></div>
        <div class="ex-ko" id="c-ex-ko"></div>
        <div class="ex-hint"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg><span>탭하여 예문 듣기</span></div>
      </div>
      <div class="tap-hint" id="c-tap-hint">탭하여 뜻 보기</div>
      <div class="swipe-hint"><span>← 못 외움</span><span>외움 →</span></div>
      <div class="bm-overlay" id="c-bm" onclick="toggleCardBm(event)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
      </div>

    <div class="empty-state" id="empty-state" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>

      <button class="switch-btn" id="empty-switch" onclick="setStudyMode('all')" style="display:none">전체 모드로 전환</button>

      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
      <span id="btn-bad-lbl">못 외움</span>

    <button class="act-btn skip" onclick="skipCard()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>

    <button class="act-btn good" onclick="markMemorized()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>

    <button class="cb" onclick="confirmReset()" title="초기화"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.79"/></svg></button>

    <button class="cb-txt" onclick="showSettings()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg><span id="lbl-settings">설정</span></button>
  </div>

  <!-- SETTINGS PANEL -->

</div>

<div class="dlg-bg" id="dlg" style="display:none" onclick="dlgBgClick(event)"><div class="dlg"><div class="dlg-emoji" id="dlg-emoji"></div><h3 id="dlg-title"></h3><p id="dlg-msg"></p><div id="dlg-btns"></div></div></div>

<script src="words_n5.js"></script>
<script src="words_n4.js"></script>
<script src="words_n3.js"></script>
<script src="words_n2.js"></script>
<script src="words_n1.js"></script>

<script>
// ============================================================
// STATE — mirrors study_provider.dart fields
// ============================================================
const S = {
  level: 5,             // _selectedLevel
  isKo: true,           // _isKoreanUI
  batchSize: 50,        // _batchSize
  batchStart: 0,        // _currentBatchStart
  studyMode: 'all',     // StudyMode.all | 'flagged'
  sessionWords: [],     // _sessionWords
  idx: 0,               // _currentIndex
  answerVisible: false,  // _isAnswerVisible
  soundEnabled: true,   // _soundEnabled
  kanjiFontSize: 30,    // _kanjiFontSize
  meaningFontSize: 20,  // _meaningFontSize
  exampleFontSize: 18,  // _exampleFontSize  ← Flutter default=18
  fontArea: 0,
  completionCount: {},  // _batchCompletionCount
};
let wordData = {};      // { level: [word, ...] }
let touchSX = 0, touchSY = 0;
let dlgDismissable = true;
let isSpeaking = false; // _isSpeaking

// ============================================================
// INIT — mirrors initialize()
// ============================================================
function init() {
  loadProgress();
  buildWordData();
  restoreAllProgress();
  refreshWords();
  renderAll();
}

function buildWordData() {
  const raw = { 1: WORDS_N1||[], 2: WORDS_N2||[], 3: WORDS_N3||[], 4: WORDS_N4||[], 5: WORDS_N5||[] };
  for (let l = 1; l <= 5; l++) {
    wordData[l] = raw[l].map(w => ({
      kanji: w.k, hiragana: w.h, korean: w.ko, level: w.l,
      example: w.e || null, exampleKorean: w.ek || null,
      mem: false, flag: false,
    }));
  }
}

// ============================================================
// PROGRESS SAVE/LOAD — mirrors _saveProgress / _loadProgress
// Uses kanji as key (matching Flutter), NOT index
// ============================================================
function saveProgress() {
  const prog = {};
  for (let l = 1; l <= 5; l++) {
    const p = {};
    (wordData[l]||[]).forEach(w => {
      if (w.mem || w.flag) p[w.kanji] = { m: w.mem, f: w.flag };
    });
    prog[l] = p;
  }
  const data = {
    level: S.level, batchSize: S.batchSize, isKo: S.isKo,
    soundEnabled: S.soundEnabled,
    kanjiFontSize: S.kanjiFontSize, meaningFontSize: S.meaningFontSize,
    exampleFontSize: S.exampleFontSize,
    completionCount: S.completionCount, progress: prog,
    // NOTE: batchStart is NOT saved (matches Flutter behavior)
  };
  try { localStorage.setItem('jlpt', JSON.stringify(data)); } catch(e) {}
}

function loadProgress() {
  try {
    const d = JSON.parse(localStorage.getItem('jlpt'));
    if (!d) return;
    S.level = d.level || 5;
    S.batchSize = d.batchSize || 50;
    S.isKo = d.isKo !== undefined ? d.isKo : true;
    S.soundEnabled = d.soundEnabled !== undefined ? d.soundEnabled : true;
    S.kanjiFontSize = d.kanjiFontSize || 30;
    S.meaningFontSize = d.meaningFontSize || 20;
    S.exampleFontSize = d.exampleFontSize || 18;
    S.completionCount = d.completionCount || {};
    S._savedProgress = d.progress || {};
  } catch(e) {}
}

function restoreAllProgress() {
  const prog = S._savedProgress || {};
  for (let l = 1; l <= 5; l++) {
    const p = prog[l] || {};
    (wordData[l]||[]).forEach(w => {
      const s = p[w.kanji];
      if (s) { w.mem = s.m || false; w.flag = s.f || false; }
    });
  }
  delete S._savedProgress;
}

// ============================================================
// LEVEL / BATCH — mirrors setLevel, goToNextBatch, etc.
// ============================================================
function setLevel(level) {
  S.level = level;
  S.batchStart = 0;       // _loadWordsForLevel always resets
  S.studyMode = 'all';
  refreshWords();
  saveProgress();
  renderAll();
}

function getAllWords() { return wordData[S.level] || []; }

function getBatchWords() {
  const all = getAllWords();
  return all.slice(S.batchStart, Math.min(S.batchStart + S.batchSize, all.length));
}

function totalBatches() { return Math.ceil(getAllWords().length / S.batchSize); }
function currentBatch() { return Math.floor(S.batchStart / S.batchSize) + 1; }

function goToNextBatch() {
  if (S.batchStart + S.batchSize < getAllWords().length) {
    S.batchStart += S.batchSize;
    S.studyMode = 'all';
    refreshWords(); renderAll();
  }
}
function goToPrevBatch() {
  if (S.batchStart > 0) {
    S.batchStart -= S.batchSize;
    S.studyMode = 'all';
    refreshWords(); renderAll();
  }
}
function goToBatch(i) {
  S.batchStart = i * S.batchSize;
  S.studyMode = 'all';  // matches goToBatch in Flutter
  refreshWords(); renderAll();
}
function setBatchSize(size) {
  S.batchSize = size;
  S.batchStart = 0;
  refreshWords(); saveProgress(); renderAll();
}

// ============================================================
// SESSION — mirrors _refreshWords
// ============================================================
function refreshWords() {
  if (S.studyMode === 'flagged') {
    // Flutter: _allLevelWords.where((w) => w.isFlagged)
    let flagged = [];
    for (let l = 1; l <= 5; l++) flagged = flagged.concat((wordData[l]||[]).filter(w => w.flag));
    S.sessionWords = flagged;
  } else {
    S.sessionWords = getBatchWords().filter(w => !w.mem);
  }
  S.idx = 0;
  S.answerVisible = false;
}

function curWord() {
  return S.sessionWords.length && S.idx < S.sessionWords.length ? S.sessionWords[S.idx] : null;
}

// ============================================================
// STUDY MODE — mirrors setStudyMode
// ============================================================
function setStudyMode(mode) {
  S.studyMode = mode;
  refreshWords(); renderAll();
}
function toggleStudyMode() {
  setStudyMode(S.studyMode === 'all' ? 'flagged' : 'all');
}

// ============================================================
// CARD ACTIONS — mirrors showAnswer, markMemorized, etc.
// ============================================================
function onCardTap(e) {
  if (e.target.closest('.bm-overlay') || e.target.closest('.vol-btn') || e.target.closest('.ex-area')) return;
  if (!S.answerVisible) {
    showAnswer();
  } else {
    // Flutter: tap when visible → speak hiragana
    if (S.soundEnabled && curWord()) speak(curWord().hiragana);
  }
}

function showAnswer() {
  S.answerVisible = true;
  renderCard();
  if (curWord() && S.soundEnabled) speak(curWord().hiragana);
}

// mirrors markMemorized()
function markMemorized() {
  const w = curWord(); if (!w) return;
  w.mem = true;
  w.flag = false;  // Flutter: currentWord!.isFlagged = false
  saveProgress();
  nextCard();
}

// mirrors markNotMemorized()
function markNotMemorized() {
  const w = curWord(); if (!w) return;
  w.mem = false;
  // Flutter: does NOT touch isFlagged
  saveProgress();
  nextCard();
}

function skipCard() { nextCard(); }

// mirrors goToPrevCard()
function goToPrevCard() {
  if (S.idx > 0) {
    S.idx--;
    S.answerVisible = false;
    renderAll();
  }
}

// mirrors _nextCard() — the most complex function
function nextCard() {
  S.answerVisible = false;
  if (S.idx < S.sessionWords.length - 1) {
    S.idx++;
    renderAll();
    return;
  }
  // ── Last card reached ──
  if (S.studyMode === 'flagged') {
    const allMem = getBatchWords().every(w => w.mem);
    if (allMem) {
      bumpCompletion();
      getBatchWords().forEach(w => w.mem = false);
      S.studyMode = 'all';
      refreshWords(); saveProgress(); renderAll();
      showCompletionDialog();
    } else {
      refreshWords(); renderAll();
    }
    return;
  }
  // All mode
  const allMem = getBatchWords().every(w => w.mem);
  if (allMem) {
    bumpCompletion();
    getBatchWords().forEach(w => w.mem = false);
    refreshWords(); saveProgress(); renderAll();
    showCompletionDialog();
  } else {
    refreshWords();
    if (S.sessionWords.length) S.sessionWords.sort(() => Math.random() - 0.5);
    renderAll();
    showRoundCompleteDialog();
  }
}

function bumpCompletion() {
  const key = `N${S.level}_batch${S.batchStart}`;
  S.completionCount[key] = (S.completionCount[key] || 0) + 1;
  saveProgress();
}
function getCurCompletion() {
  return S.completionCount[`N${S.level}_batch${S.batchStart}`] || 0;
}

// mirrors shuffleSession()
function shuffleSession() {
  S.sessionWords = S.sessionWords.filter(w => !w.mem);
  S.sessionWords.sort(() => Math.random() - 0.5);
  S.idx = 0;
  S.answerVisible = false;
  renderAll();
}

// mirrors studyRemainingWords()
function studyRemainingWords() {
  S.sessionWords = getBatchWords().filter(w => !w.mem);
  S.sessionWords.sort(() => Math.random() - 0.5);
  S.idx = 0;
  S.answerVisible = false;
  renderAll();
}

// mirrors resetBatchProgress()
function resetBatch() {
  getBatchWords().forEach(w => { w.mem = false; w.flag = false; });
  saveProgress(); refreshWords(); renderAll();
}

function confirmReset() {
  const k = S.isKo;
  dlgDismissable = true;
  showDlg('⚠️', k?'현재 스테이지 초기화':'現在ステージリセット',
    k?'현재 스테이지의 학습 기록을 초기화할까요?\n(외움 / 못외움 전부 초기화)':'現在ステージの学習記録をリセットしますか？',
    [{l:k?'취소':'キャンセル',c:'blue',fn:closeDlg},{l:k?'초기화':'リセット',c:'red',fn:()=>{closeDlg();resetBatch();}}]
  );
}

// ============================================================
// BOOKMARK — mirrors toggleBookmark
// ============================================================
function toggleBookmark(w) {
  w.flag = !w.flag;
  saveProgress();
  if (S.studyMode === 'flagged') {
    // Flutter: rebuild session, clamp index
    let flagged = [];
    for (let l = 1; l <= 5; l++) flagged = flagged.concat((wordData[l]||[]).filter(x => x.flag));
    S.sessionWords = flagged;
    S.idx = Math.min(S.idx, Math.max(0, S.sessionWords.length - 1));
  }
  renderAll();
}
function toggleCardBm(e) { e.stopPropagation(); const w = curWord(); if (w) toggleBookmark(w); }
function onBadBtn() {
  if (S.studyMode === 'flagged') { const w = curWord(); if (w) toggleBookmark(w); }
  else markNotMemorized();
}

// ============================================================
// TTS — mirrors speak(), _initTts
// ============================================================
function speak(text) {
  if (!S.soundEnabled || !text || isSpeaking) return;
  isSpeaking = true;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ja-JP'; u.rate = 0.85; u.volume = 1;
  u.onend = () => { isSpeaking = false; };
  u.onerror = () => { isSpeaking = false; };
  window.speechSynthesis.speak(u);
}
function speakHira(e) { e.stopPropagation(); const w = curWord(); if (w && S.soundEnabled) speak(w.hiragana); }
function speakEx(e) {
  e.stopPropagation();
  const w = curWord();
  if (!w || !w.example || !S.soundEnabled) return;
  // Flutter exact regex: replaces kanji(hiragana) → hiragana, keeps rest
  const clean = w.example.replace(
    /[\u4e00-\u9faf\u30A0-\u30FF][\u4e00-\u9faf\u3040-\u309f\u30A0-\u30FF]*[\(（]([^)）]+)[\)）]/g, '$1'
  );
  speak(clean);
}
function toggleSound() {
  S.soundEnabled = !S.soundEnabled;
  if (!S.soundEnabled) window.speechSynthesis.cancel();
  saveProgress(); renderTitlebar(); renderSettingsPanel();
}
function toggleLang() { S.isKo = !S.isKo; saveProgress(); renderAll(); }

// ============================================================
// SWIPE — mirrors onHorizontalDragEnd
// ============================================================
function tsStart(e) { touchSX = e.touches[0].clientX; touchSY = e.touches[0].clientY; }
function tsEnd(e) {
  const dx = e.changedTouches[0].clientX - touchSX;
  const dy = e.changedTouches[0].clientY - touchSY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 60) {
    if (dx < 0) markNotMemorized(); else markMemorized();
  }
}

// ============================================================
// RENDERING
// ============================================================
function renderAll() {
  renderTitlebar(); renderLevelBar(); renderStageBar();
  renderProgressBar(); renderCard(); renderActions();
  renderSettingsPanel(); renderStatsPanel();
}

function renderTitlebar() {
  document.getElementById('app-title').textContent = S.isKo ? '일본어 단어장' : '日本語 単語帳';
  document.title = S.isKo ? '일본어 단어장' : '日本語 単語帳';
  document.getElementById('lang-btn').textContent = S.isKo ? 'KO' : 'JP';
  const btn = document.getElementById('sound-btn');
  btn.classList.toggle('muted', !S.soundEnabled);
  document.getElementById('sound-icon').innerHTML = S.soundEnabled
    ? '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>'
    : '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>';
}

function renderLevelBar() {
  document.querySelectorAll('.lvl-btn').forEach(b => b.classList.toggle('active', +b.dataset.l === S.level));
  const bmBtn = document.getElementById('bm-mode-btn');
  bmBtn.classList.toggle('active', S.studyMode === 'flagged');
  // Flutter: flaggedCount = ALL levels flagged
  let fc = 0; for (let l = 1; l <= 5; l++) fc += (wordData[l]||[]).filter(w => w.flag).length;
  document.getElementById('total-flag-count').textContent = fc;
  // Update icon to filled when active
  bmBtn.querySelector('svg').innerHTML = S.studyMode === 'flagged'
    ? '<path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z" fill="currentColor"/>'
    : '<path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>';
}

function renderStageBar() {
  const sc = document.getElementById('stage-scroll');
  const tb = totalBatches(), cb = currentBatch(), k = S.isKo;
  let h = '';
  for (let i = 0; i < tb; i++)
    h += `<button class="stage-btn ${i+1===cb?'active':''}" onclick="goToBatch(${i})">${k?'스테이지':'ステージ'} ${String(i+1).padStart(2,'0')}</button>`;
  sc.innerHTML = h;
  setTimeout(() => { const a = sc.querySelector('.active'); if (a) a.scrollIntoView({behavior:'smooth',inline:'start',block:'nearest'}); }, 50);
}

function renderProgressBar() {
  const batch = getBatchWords(), tot = batch.length;
  const mem = batch.filter(w => w.mem).length;
  // Flutter: flagged from allWordsForLevel (entire level)
  const flag = getAllWords().filter(w => w.flag).length;
  const pct = tot > 0 ? mem / tot : 0;
  document.getElementById('pbar-fill').style.width = (pct*100)+'%';
  document.getElementById('p-mem').textContent = mem;
  document.getElementById('p-tot').textContent = tot;
  document.getElementById('p-flag').textContent = flag;
  document.getElementById('p-flag-wrap').style.display = flag > 0 ? '' : 'none';
  document.getElementById('prev-batch').disabled = S.batchStart === 0;
  document.getElementById('next-batch').disabled = S.batchStart + S.batchSize >= getAllWords().length;
  document.getElementById('batch-num').textContent = `${currentBatch()}/${totalBatches()}`;
}

function renderCard() {
  const w = curWord(), empty = !w;
  document.getElementById('flashcard').style.display = empty ? 'none' : '';
  document.getElementById('empty-state').style.display = empty ? 'flex' : 'none';
  document.getElementById('actions').style.display = empty ? 'none' : '';
  const isFlagged = S.studyMode === 'flagged';
  if (empty) {
    document.getElementById('empty-txt').textContent = isFlagged
      ? (S.isKo?'북마크한 단어가 없습니다':'ブックマークした単語がありません')
      : (S.isKo?'이 레벨에 단어가 없습니다':'このレベルに単語がありません');
    document.getElementById('empty-switch').style.display = isFlagged ? '' : 'none';
    document.getElementById('empty-switch').textContent = S.isKo ? '전체 모드로 전환' : '全体モードに切替';
    document.getElementById('fc-counter-txt').textContent = '0 / 0';
    return;
  }
  // Counter
  document.getElementById('fc-counter-txt').textContent = `${S.idx+1} / ${S.sessionWords.length}`;
  const mb = document.getElementById('fc-mode-badge');
  mb.style.display = isFlagged ? '' : 'none';
  mb.textContent = S.isKo ? '북마크' : 'ブックマーク';
  // currentBatchFlaggedCount
  document.getElementById('fc-bm-num').textContent = getBatchWords().filter(x => x.flag).length;

  // Level badge
  const lc = {1:'var(--n1)',2:'var(--n2)',3:'var(--n3)',4:'var(--n4)',5:'var(--n5)'};
  const badge = document.getElementById('c-lv-badge');
  badge.textContent = `N${w.level}`; badge.style.color = lc[w.level];
  badge.style.background = lc[w.level]+'33'; badge.style.border = `1px solid ${lc[w.level]}88`;

  // Kanji
  const kEl = document.getElementById('c-kanji');
  kEl.textContent = w.kanji; kEl.style.fontSize = S.kanjiFontSize+'px';

  // Hiragana & Korean
  const hira = document.getElementById('c-hira');
  hira.textContent = w.hiragana; hira.style.fontSize = (S.meaningFontSize*0.9)+'px';
  const ko = document.getElementById('c-ko');
  ko.textContent = w.korean; ko.style.fontSize = S.meaningFontSize+'px';
  const vol = document.getElementById('c-vol');
  const th = document.getElementById('c-tap-hint');
  const ex = document.getElementById('c-ex-area');

  if (S.answerVisible) {
    hira.classList.remove('hidden'); ko.classList.remove('hidden');
    vol.style.display = '';
    th.classList.add('hidden');
    if (w.example) { renderExample(w); ex.style.display = ''; } else ex.style.display = 'none';
  } else {
    hira.classList.add('hidden'); ko.classList.add('hidden');
    vol.style.display = 'none';
    th.classList.remove('hidden');
    th.textContent = S.isKo ? '탭하여 뜻 보기' : 'タップして答えを見る';
    ex.style.display = 'none';
  }

  // Bookmark overlay
  const bm = document.getElementById('c-bm');

// mirrors ruby_text_widget.dart _parse
function parseRuby(text, sz) {
  const rsz = sz * 0.7; // Flutter: exampleFontSize * 0.7
  const parts = [], re = /([^(（]+?)[\(（]([^)）]+?)[\)）]|([^(（]+)/g;
  let m;
  while ((m = re.exec(text)) !== null) {
    if (m[1] && m[2])
      parts.push(`<span class="ruby-unit"><span class="rt" style="font-size:${rsz}px">${m[2]}</span><span class="rb">${m[1]}</span></span>`);
    else if (m[3])
      parts.push(`<span class="ruby-unit"><span class="rt" style="font-size:${rsz}px">&nbsp;</span><span class="rb">${m[3]}</span></span>`);
  }
  return parts.join('');
}

function setFontArea(v) { S.fontArea = v; renderSettingsPanel(); }
function onFontSlide(v) {
  const n = parseFloat(v);
  if (S.fontArea===0) S.kanjiFontSize=n; else if(S.fontArea===1) S.meaningFontSize=n; else S.exampleFontSize=n;
  saveProgress(); renderCard(); renderSettingsPanel();
}

// STATS PANEL — mirrors stats_panel.dart
// ============================================================
function renderStatsPanel() {
  const p = document.getElementById('stats-panel');
  if (p.style.display === 'none') return;
  const k = S.isKo;
  const batch = getBatchWords(), tot = batch.length;
  const mem = batch.filter(w=>w.mem).length;
  const flag = batch.filter(w=>w.flag).length;
  const rem = tot-mem-flag, pct = tot>0?Math.round(mem/tot*100):0;
  const lc = {1:'var(--n1)',2:'var(--n2)',3:'var(--n3)',4:'var(--n4)',5:'var(--n5)'};

  let levelsHtml = '';
  for (let l = 5; l >= 1; l--) {
    const ws = wordData[l]||[], t=ws.length, m=ws.filter(w=>w.mem).length, f=ws.filter(w=>w.flag).length;
    const pr = t>0?m/t:0;
    levelsHtml += `<div class="lsr ${l===S.level?'cur':''}">
      <div class="lsr-badge" style="background:${lc[l]}33;color:${lc[l]}">N${l}</div>
      <div class="lsr-info"><div class="lsr-nums"><span>${m} / ${t}</span>${f>0?`<span style="margin-left:6px;color:rgba(231,76,60,0.7);font-size:10px">🔖 ${f}</span>`:''}<span class="lsr-pct" style="color:${lc[l]}">${Math.round(pr*100)}%</span></div>
      <div class="lsr-track"><div class="lsr-fill" style="width:${pr*100}%;background:${lc[l]}"></div></div></div></div>`;
  }

  p.innerHTML = `
    <div class="panel-hdr"><h2>${k?'학습 통계':'学習統計'}</h2><button class="panel-close" onclick="closePanel()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
    <div class="sec-label">${k?`N${S.level} 현재 배치`:`N${S.level} 現在のバッチ`}</div>
    <div class="stats-card">
      <div class="mini-stats">
        <div class="mini-stat mem"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 12l2 2 4-4M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg><span class="val">${mem}</span><span class="lbl">${k?'외움':'覚えた'}</span></div>
        <div class="mini-stat flag"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg><span class="val">${flag}</span><span class="lbl">${k?'복습 필요':'要復習'}</span></div>
        <div class="mini-stat rem"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/></svg><span class="val">${rem}</span><span class="lbl">${k?'미학습':'未学習'}</span></div>
      </div>
      <div class="sp-track"><div class="sp-fill" style="width:${pct}%"></div></div>
      <div class="sp-pct">${k?`배치 완성도 ${pct}%`:`バッチ完成度 ${pct}%`}</div>
    </div>
    <div class="sec-label">${k?'레벨별 전체 현황':'レベル別全体状況'}</div>
    ${levelsHtml}`;
}

function showDlg(emoji,title,msg,btns) {
  document.getElementById('dlg-emoji').textContent = emoji;
  document.getElementById('dlg-title').textContent = title;
  document.getElementById('dlg-msg').textContent = msg;
  const bc = document.getElementById('dlg-btns'); bc.innerHTML = '';
  btns.forEach(b => {
    const btn = document.createElement('button');
    btn.className = `dlg-btn ${b.c}`; btn.textContent = b.l; btn.onclick = b.fn;
    bc.appendChild(btn);
  });
  document.getElementById('dlg').style.display = 'flex';
}
function closeDlg() { document.getElementById('dlg').style.display = 'none'; }
function dlgBgClick(e) { if (e.target.id === 'dlg' && dlgDismissable) closeDlg(); }

// mirrors _showCompletionDialog
function showCompletionDialog() {
  const k = S.isKo, cnt = getCurCompletion();
  let fc = 0; for (let l=1;l<=5;l++) fc += (wordData[l]||[]).filter(w=>w.flag).length;
  const isLast = currentBatch() >= totalBatches();
  const btns = [
    {l:k?'다시 공부하기':'もう一度学習', c:'green', fn:closeDlg},
    {l:isLast?(k?'다음 레벨로 →':'次のレベルへ →'):(k?'다음 스테이지로 →':'次のステージへ →'), c:'blue',
      fn:()=>{closeDlg();if(isLast){const n=S.level-1;setLevel(n>=1?n:5);}else goToBatch(currentBatch());}},
  ];
  if (fc > 0) btns.push({l:k?`복습하기 (${fc}개)`:`復習する (${fc}個)`, c:'red',
    fn:()=>{closeDlg();setStudyMode('flagged');}});
  dlgDismissable = true; // Flutter: barrierDismissible default true
  showDlg('🎉', k?`${cnt}회독 완료!`:`${cnt}周目完了!`,
    k?`스테이지 ${currentBatch()} 단어를 모두 외웠어요!`:`ステージ ${currentBatch()} の単語を全部覚えました！`, btns);
}

// mirrors _showRoundCompleteDialog
function showRoundCompleteDialog() {
  const k = S.isKo;
  const rem = getBatchWords().filter(w => !w.mem).length;
  const isLast = currentBatch() >= totalBatches();
  const msg = S.sessionWords.length === 0
    ? (k?'모든 단어를 넘겼습니다.\n다시 공부하시겠어요?':'全ての単語をスキップしました。\nもう一度学習しますか？')
    : (k?`아직 외우지 못한 단어가 ${rem}개 있어요.\n계속 공부하시겠어요?`:`まだ覚えていない単語が${rem}個あります。\n続けて勉強しますか？`);
  const btns = [
    {l:k?`남은 단어 공부 (${rem}개)`:`残りの単語を学習 (${rem}個)`, c:'blue', fn:()=>{closeDlg();studyRemainingWords();}},
    {l:isLast?(k?'다음 레벨로 →':'次のレベルへ →'):(k?'다음 스테이지로 →':'次のステージへ →'), c:'green',
      fn:()=>{closeDlg();if(isLast){const n=S.level-1;setLevel(n>=1?n:5);}else goToBatch(currentBatch());}},
  ];
  dlgDismissable = false; // Flutter: barrierDismissible: false
  showDlg('📖', k?'한 바퀴 완료!':'一周完了！', msg, btns);
}
